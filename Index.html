<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد المخططات التقنية - أي ابتكار</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Noto Kufi Arabic', sans-serif;
            background-color: #0a1622;
            color: #e0d7c0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            direction: rtl;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 20, 35, 0.85);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.15);
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #f0e6c5;
            letter-spacing: 2px;
            border-bottom: 1px solid #2a4a5a;
            padding-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        label {
            font-weight: 700;
            font-size: 1.1rem;
            color: #d0cfb0;
        }

        input, textarea {
            background: #0d1b2a;
            border: 1px solid #2e4a5e;
            color: #f0e6c5;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            resize: vertical;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #b8a87f;
            box-shadow: 0 0 8px #b8a87f44;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1.5rem 0;
        }

        button {
            background: #1e3545;
            border: 1px solid #4a6a7a;
            color: #f0e6c5;
            padding: 0.7rem 1.8rem;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        button:hover {
            background: #2c4a5e;
            border-color: #b8a87f;
            box-shadow: 0 0 12px #b8a87f55;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        .blueprint-area {
            background: #07101a;
            border: 1px solid #1e3a4a;
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1rem;
            overflow-x: auto;
            background-image: radial-gradient(circle, #1a3344 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .download-btn {
            background: #2d4a3e;
            border-color: #4a7a5e;
        }
        .download-btn:hover {
            background: #3a5e4e;
        }

        .hint {
            font-size: 0.85rem;
            color: #8a9aa0;
            margin-top: -0.5rem;
        }

        footer {
            margin-top: 2rem;
            color: #5a7a8a;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ مولّد المخطط التقني (أي ابتكار)</h1>

        <div class="input-group">
            <label for="inventionName">📌 اسم الاختراع:</label>
            <input type="text" id="inventionName" placeholder="مثلاً: جهاز تنقية مياه متعدد المراحل" value="جهاز تنقية مياه">

            <label for="partsList">🔧 الأجزاء الرئيسية (افصل بينها بفاصلة):</label>
            <textarea id="partsList" rows="3" placeholder="فلتر أولي، مضخة، غشاء تناضح عكسي، خزان تجميع، وحدة تعقيم">فلتر أولي، مضخة، غشاء تناضح عكسي، خزان تجميع، وحدة تعقيم</textarea>
            <span class="hint">💡 أدخل 3 إلى 8 أجزاء ليتم ترتيبها في مخطط التدفق</span>
        </div>

        <div class="btn-group">
            <button id="generateBtn">✨ ولّد المخطط</button>
            <button id="downloadSvgBtn" class="download-btn">💾 تحميل SVG</button>
            <button id="downloadPngBtn" class="download-btn">🖼️ تحميل PNG</button>
        </div>

        <div id="blueprintContainer" class="blueprint-area">
            <!-- سيُملأ بالمخطط SVG -->
        </div>
    </div>
    <footer>مخطط تقني عام · نمط Blueprint · أي فكرة</footer>

    <script>
        (function() {
            // ========== عناصر DOM ==========
            const inventionNameInput = document.getElementById('inventionName');
            const partsListInput = document.getElementById('partsList');
            const generateBtn = document.getElementById('generateBtn');
            const downloadSvgBtn = document.getElementById('downloadSvgBtn');
            const downloadPngBtn = document.getElementById('downloadPngBtn');
            const container = document.getElementById('blueprintContainer');

            // ========== إعدادات الألوان والأبعاد ==========
            const COLORS = {
                bgDark: '#07101a',
                gridLine: '#1a3344',
                drawingStroke: '#e0d7c0',
                drawingFill: 'none',
                arrowColor: '#c0b090',
                textColor: '#e0d7c0',
                titleColor: '#f0e6c5',
                accent: '#b8a87f',
                partFill: 'rgba(224, 215, 192, 0.05)'
            };

            const SVG_WIDTH = 1000;
            const SVG_HEIGHT = 680;

            // ========== دوال الرسم العامة ==========

            /** إنشاء نمط الشبكة */
            function createGrid(svg) {
                const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                const pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
                pattern.setAttribute("id", "grid");
                pattern.setAttribute("width", "40");
                pattern.setAttribute("height", "40");
                pattern.setAttribute("patternUnits", "userSpaceOnUse");

                const hLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                hLine.setAttribute("x1", "0"); hLine.setAttribute("y1", "40");
                hLine.setAttribute("x2", "40"); hLine.setAttribute("y2", "40");
                hLine.setAttribute("stroke", COLORS.gridLine);
                hLine.setAttribute("stroke-width", "0.8");
                pattern.appendChild(hLine);

                const vLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                vLine.setAttribute("x1", "40"); vLine.setAttribute("y1", "0");
                vLine.setAttribute("x2", "40"); vLine.setAttribute("y2", "40");
                vLine.setAttribute("stroke", COLORS.gridLine);
                vLine.setAttribute("stroke-width", "0.8");
                pattern.appendChild(vLine);

                defs.appendChild(pattern);
                svg.appendChild(defs);

                const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                bgRect.setAttribute("width", "100%");
                bgRect.setAttribute("height", "100%");
                bgRect.setAttribute("fill", "url(#grid)");
                svg.appendChild(bgRect);
            }

            /** إنشاء رأس سهم عام */
            function createArrowMarker(svg) {
                let defs = svg.querySelector('defs');
                if (!defs) {
                    defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                    svg.appendChild(defs);
                }
                const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
                marker.setAttribute("id", "arrowhead");
                marker.setAttribute("markerWidth", "8");
                marker.setAttribute("markerHeight", "6");
                marker.setAttribute("refX", "7");
                marker.setAttribute("refY", "3");
                marker.setAttribute("orient", "auto");
                const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", "0 0, 8 3, 0 6");
                polygon.setAttribute("fill", COLORS.arrowColor);
                marker.appendChild(polygon);
                defs.appendChild(marker);
            }

            /** رسم مخطط التدفق الرئيسي (أجزاء متصلة أفقيًا) */
            function drawMainFlow(svg, parts) {
                const flowGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                flowGroup.setAttribute("stroke", COLORS.drawingStroke);
                flowGroup.setAttribute("fill", COLORS.partFill);
                flowGroup.setAttribute("stroke-width", "2");

                const startX = 100;       // بداية من اليمين (RTL)
                const yCenter = 300;      // منتصف عمودي
                const blockWidth = 110;
                const blockHeight = 70;
                const gap = 40;           // مسافة بين المربعات

                parts.forEach((part, index) => {
                    const x = startX + index * (blockWidth + gap);
                    // رسم مستطيل يمثل الجزء
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x);
                    rect.setAttribute("y", yCenter - blockHeight/2);
                    rect.setAttribute("width", blockWidth);
                    rect.setAttribute("height", blockHeight);
                    rect.setAttribute("rx", "8");
                    rect.setAttribute("ry", "8");
                    flowGroup.appendChild(rect);

                    // نص اسم الجزء داخل المستطيل
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x + blockWidth/2);
                    text.setAttribute("y", yCenter + 5);
                    text.setAttribute("font-family", "'Tajawal', sans-serif");
                    text.setAttribute("font-size", "15");
                    text.setAttribute("font-weight", "bold");
                    text.setAttribute("fill", COLORS.textColor);
                    text.setAttribute("text-anchor", "middle");
                    text.textContent = part.trim().length > 10 ? part.trim().substring(0,9)+'…' : part.trim();
                    flowGroup.appendChild(text);

                    // إضافة سهم بين الأجزاء (ما عدا الأخير)
                    if (index < parts.length - 1) {
                        const arrow = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        const nextX = startX + (index + 1) * (blockWidth + gap);
                        arrow.setAttribute("x1", x + blockWidth + 5);
                        arrow.setAttribute("y1", yCenter);
                        arrow.setAttribute("x2", nextX - 5);
                        arrow.setAttribute("y2", yCenter);
                        arrow.setAttribute("stroke", COLORS.arrowColor);
                        arrow.setAttribute("stroke-width", "2");
                        arrow.setAttribute("marker-end", "url(#arrowhead)");
                        flowGroup.appendChild(arrow);
                    }
                });

                svg.appendChild(flowGroup);
            }

            /** رسم منظورين مساعدين (علوي وجانبي) */
            function drawAuxiliaryViews(svg, parts) {
                const auxGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                auxGroup.setAttribute("stroke", COLORS.drawingStroke);
                auxGroup.setAttribute("fill", COLORS.partFill);
                auxGroup.setAttribute("stroke-width", "1.5");

                // --- منظور جانبي (أسفل اليمين) ---
                const sideLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                sideLabel.setAttribute("x", "180");
                sideLabel.setAttribute("y", "590");
                sideLabel.setAttribute("font-family", "'Tajawal', sans-serif");
                sideLabel.setAttribute("font-size", "15");
                sideLabel.setAttribute("fill", COLORS.textColor);
                sideLabel.setAttribute("text-anchor", "middle");
                sideLabel.textContent = "منظور جانبي";
                auxGroup.appendChild(sideLabel);

                // رسم أجزاء كأعمدة متراصة
                const sideStartX = 80;
                const sideYBase = 550;
                const colWidth = 40;
                const colGap = 15;
                const maxHeight = 60;
                parts.forEach((part, idx) => {
                    const x = sideStartX + idx * (colWidth + colGap);
                    const h = maxHeight * (0.8 + (idx % 2) * 0.3); // تنويع بسيط
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x);
                    rect.setAttribute("y", sideYBase - h);
                    rect.setAttribute("width", colWidth);
                    rect.setAttribute("height", h);
                    rect.setAttribute("rx", "3");
                    auxGroup.appendChild(rect);

                    // اختصار اسم الجزء
                    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x + colWidth/2);
                    t.setAttribute("y", sideYBase + 18);
                    t.setAttribute("font-family", "'Tajawal', sans-serif");
                    t.setAttribute("font-size", "10");
                    t.setAttribute("fill", COLORS.textColor);
                    t.setAttribute("text-anchor", "middle");
                    t.textContent = part.trim().substring(0,4);
                    auxGroup.appendChild(t);
                });

                // --- منظور أمامي/علوي (أسفل اليسار) ---
                const topLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                topLabel.setAttribute("x", "740");
                topLabel.setAttribute("y", "590");
                topLabel.setAttribute("font-family", "'Tajawal', sans-serif");
                topLabel.setAttribute("font-size", "15");
                topLabel.setAttribute("fill", COLORS.textColor);
                topLabel.setAttribute("text-anchor", "middle");
                topLabel.textContent = "منظور أمامي (مقطع)";
                auxGroup.appendChild(topLabel);

                // دوائر متتالية تمثل المقطع العرضي
                const topStartX = 660;
                const topY = 550;
                const radius = 18;
                const topGap = 20;
                parts.forEach((part, idx) => {
                    const cx = topStartX + idx * (radius*2 + topGap);
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", cx);
                    circle.setAttribute("cy", topY);
                    circle.setAttribute("r", radius);
                    circle.setAttribute("fill", COLORS.partFill);
                    circle.setAttribute("stroke", COLORS.drawingStroke);
                    auxGroup.appendChild(circle);

                    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", cx);
                    t.setAttribute("y", topY + 5);
                    t.setAttribute("font-family", "'Tajawal', sans-serif");
                    t.setAttribute("font-size", "9");
                    t.setAttribute("fill", COLORS.textColor);
                    t.setAttribute("text-anchor", "middle");
                    t.textContent = part.trim().substring(0,3);
                    auxGroup.appendChild(t);
                });

                svg.appendChild(auxGroup);
            }

            /** إضافة عنوان الاختراع */
            function addTitle(svg, titleText) {
                const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
                title.setAttribute("x", "50");
                title.setAttribute("y", "60");
                title.setAttribute("font-family", "'Tajawal', sans-serif");
                title.setAttribute("font-size", "28");
                title.setAttribute("font-weight", "bold");
                title.setAttribute("fill", COLORS.titleColor);
                title.textContent = titleText || "مخطط تقني";
                svg.appendChild(title);
            }

            /** توليد المخطط الكامل */
            function generateBlueprint() {
                const partsRaw = partsListInput.value.trim();
                const parts = partsRaw ? partsRaw.split(/[،,]+/).filter(p => p.trim() !== '') : ['مدخل', 'معالجة', 'مخرج'];
                const title = inventionNameInput.value.trim() || 'اختراع';

                // إنشاء SVG
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                svg.setAttribute("viewBox", `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);
                svg.setAttribute("width", "100%");
                svg.setAttribute("height", "auto");
                svg.style.backgroundColor = COLORS.bgDark;
                svg.style.borderRadius = "8px";

                createGrid(svg);
                createArrowMarker(svg);
                addTitle(svg, title);
                drawMainFlow(svg, parts);
                drawAuxiliaryViews(svg, parts);

                container.innerHTML = '';
                container.appendChild(svg);
            }

            // ========== التحميل ==========

            function downloadSVG() {
                const svgElement = container.querySelector('svg');
                if (!svgElement) return alert('لا يوجد مخطط.');
                const serializer = new XMLSerializer();
                let svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + serializer.serializeToString(svgElement);
                const blob = new Blob([svgStr], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (inventionNameInput.value.trim() || 'مخطط') + '.svg';
                a.click();
                URL.revokeObjectURL(url);
            }

            function downloadPNG() {
                const svgElement = container.querySelector('svg');
                if (!svgElement) return alert('لا يوجد مخطط.');
                const serializer = new XMLSerializer();
                const svgStr = serializer.serializeToString(svgElement);
                const canvas = document.createElement('canvas');
                canvas.width = SVG_WIDTH;
                canvas.height = SVG_HEIGHT;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                img.onload = function() {
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);
                    canvas.toBlob(function(blob) {
                        const pngUrl = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = pngUrl;
                        a.download = (inventionNameInput.value.trim() || 'مخطط') + '.png';
                        a.click();
                        URL.revokeObjectURL(pngUrl);
                    }, 'image/png');
                };
                img.src = url;
            }

            // ========== ربط الأحداث ==========
            generateBtn.addEventListener('click', generateBlueprint);
            downloadSvgBtn.addEventListener('click', downloadSVG);
            downloadPngBtn.addEventListener('click', downloadPNG);

            // توليد افتراضي عند تحميل الصفحة
            window.addEventListener('DOMContentLoaded', generateBlueprint);
        })();
    </script>
</body>
</html>
