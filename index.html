<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد المخططات التقنية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Noto Kufi Arabic', sans-serif;
            background-color: #0a1622;
            color: #e0d7c0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            direction: rtl;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 20, 35, 0.85);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.15);
        }
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #f0e6c5;
            border-bottom: 1px solid #2a4a5a;
            padding-bottom: 0.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        label { font-weight: 700; color: #d0cfb0; }
        input, textarea {
            background: #0d1b2a;
            border: 1px solid #2e4a5e;
            color: #f0e6c5;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            resize: vertical;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #b8a87f;
            box-shadow: 0 0 8px #b8a87f44;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1.5rem 0;
        }
        button {
            background: #1e3545;
            border: 1px solid #4a6a7a;
            color: #f0e6c5;
            padding: 0.7rem 1.8rem;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        button:hover {
            background: #2c4a5e;
            border-color: #b8a87f;
            box-shadow: 0 0 12px #b8a87f55;
            transform: translateY(-2px);
        }
        .download-btn { background: #2d4a3e; border-color: #4a7a5e; }
        .download-btn:hover { background: #3a5e4e; }
        .blueprint-area {
            background: #07101a;
            border: 1px solid #1e3a4a;
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1rem;
            overflow-x: auto;
            background-image: radial-gradient(circle, #1a3344 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .hint { font-size: 0.85rem; color: #8a9aa0; margin-top: -0.5rem; }
        footer { margin-top: 2rem; color: #5a7a8a; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ مولّد المخطط التقني</h1>
        <div class="input-group">
            <label for="inventionName">📌 اسم الاختراع:</label>
            <input type="text" id="inventionName" value="مثبّت التوازن للدرّاجة الهوائية">
            <label for="partsList">🔧 الأجزاء الرئيسية:</label>
            <textarea id="partsList" rows="3">حلقة محمل كروي على الدواسة، أنبوب تثبيت سفلي ثابت، وصلة كوعية عند الشوكة، أصابع قبضة ميكانيكية، سلك تحرير سريع</textarea>
            <span class="hint">💡 أدخل 3 إلى 8 أجزاء مفصولة بفاصلة أو سطر جديد أو نقطة</span>
        </div>
        <div class="btn-group">
            <button id="generateBtn">✨ ولّد المخطط</button>
            <button id="downloadSvgBtn" class="download-btn">💾 تحميل SVG</button>
            <button id="downloadPngBtn" class="download-btn">🖼️ تحميل PNG</button>
        </div>
        <div id="blueprintContainer" class="blueprint-area"></div>
    </div>
    <footer>مخطط تقني عام · نمط Blueprint</footer>

    <script>
        (function() {
            // العناصر
            const inventionInput = document.getElementById('inventionName');
            const partsInput = document.getElementById('partsList');
            const container = document.getElementById('blueprintContainer');
            const SVG_W = 1000, SVG_H = 680;

            // تحليل الأجزاء (يدعم الفاصلة والنقطة والسطر الجديد)
            function parseParts(raw) {
                return raw.split(/[،,\n.]+/).map(p => p.trim()).filter(p => p.length > 0);
            }

            // بناء SVG فارغ مع خلفية وشبكة
            function createBaseSVG() {
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("viewBox", `0 0 ${SVG_W} ${SVG_H}`);
                svg.setAttribute("width", "100%");
                svg.setAttribute("height", "auto");
                svg.style.backgroundColor = "#07101a";
                svg.style.borderRadius = "8px";

                // نمط الشبكة
                const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                const pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
                pattern.setAttribute("id", "grid");
                pattern.setAttribute("width", "40");
                pattern.setAttribute("height", "40");
                pattern.setAttribute("patternUnits", "userSpaceOnUse");
                const hl = document.createElementNS("http://www.w3.org/2000/svg", "line");
                hl.setAttribute("x1","0"); hl.setAttribute("y1","40"); hl.setAttribute("x2","40"); hl.setAttribute("y2","40");
                hl.setAttribute("stroke","#1a3344"); hl.setAttribute("stroke-width","0.8");
                pattern.appendChild(hl);
                const vl = document.createElementNS("http://www.w3.org/2000/svg", "line");
                vl.setAttribute("x1","40"); vl.setAttribute("y1","0"); vl.setAttribute("x2","40"); vl.setAttribute("y2","40");
                vl.setAttribute("stroke","#1a3344"); vl.setAttribute("stroke-width","0.8");
                pattern.appendChild(vl);
                defs.appendChild(pattern);

                // سهم رئيسي
                const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
                marker.setAttribute("id", "arrow");
                marker.setAttribute("markerWidth","8"); marker.setAttribute("markerHeight","6");
                marker.setAttribute("refX","7"); marker.setAttribute("refY","3"); marker.setAttribute("orient","auto");
                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                poly.setAttribute("points","0 0, 8 3, 0 6"); poly.setAttribute("fill","#c0b090");
                marker.appendChild(poly);
                defs.appendChild(marker);

                svg.appendChild(defs);

                const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                bg.setAttribute("width","100%"); bg.setAttribute("height","100%");
                bg.setAttribute("fill","url(#grid)");
                svg.appendChild(bg);
                return svg;
            }

            // دالة مساعدة: نص عربي مضبوط
            function createText(x, y, content, size=16, anchor="start", fill="#e0d7c0") {
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", x);
                t.setAttribute("y", y);
                t.setAttribute("font-family", "'Tajawal', 'Noto Kufi Arabic', sans-serif");
                t.setAttribute("font-size", size);
                t.setAttribute("fill", fill);
                t.setAttribute("text-anchor", anchor);
                t.setAttribute("direction", "rtl");
                t.setAttribute("unicode-bidi", "embed");
                t.textContent = content;
                return t;
            }

            // رسم المخطط الرئيسي
            function drawMain(svg, parts) {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("stroke", "#e0d7c0");
                g.setAttribute("fill", "rgba(224,215,192,0.05)");
                g.setAttribute("stroke-width", "2");

                const startX = 120, y = 300, bw = 120, bh = 70, gap = 30;
                parts.forEach((part, i) => {
                    const x = startX + i * (bw + gap);
                    // المستطيل
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x); rect.setAttribute("y", y - bh/2);
                    rect.setAttribute("width", bw); rect.setAttribute("height", bh);
                    rect.setAttribute("rx", "8");
                    g.appendChild(rect);
                    // النص (يقبل حتى 12 حرفاً ويقطع)
                    const label = part.length > 12 ? part.substring(0,11)+'…' : part;
                    const t = createText(x + bw/2, y + 6, label, 15, "middle", "#f0e6c5");
                    g.appendChild(t);

                    // سهم بين القطع
                    if (i < parts.length - 1) {
                        const arrow = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        arrow.setAttribute("x1", x + bw + 4);
                        arrow.setAttribute("y1", y);
                        arrow.setAttribute("x2", x + bw + gap - 4);
                        arrow.setAttribute("y2", y);
                        arrow.setAttribute("stroke", "#c0b090");
                        arrow.setAttribute("stroke-width", "2");
                        arrow.setAttribute("marker-end", "url(#arrow)");
                        g.appendChild(arrow);
                    }
                });
                svg.appendChild(g);
            }

            // منظورات مساعدة
            function drawAux(svg, parts) {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("stroke", "#e0d7c0");
                g.setAttribute("fill", "rgba(224,215,192,0.05)");
                g.setAttribute("stroke-width", "1.5");

                // منظور جانبي (يمين)
                const sideY = 550, colW = 40, gap = 15;
                parts.forEach((p, i) => {
                    const x = 60 + i * (colW + gap);
                    const h = 40 + (i % 3) * 10;
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x); rect.setAttribute("y", sideY - h);
                    rect.setAttribute("width", colW); rect.setAttribute("height", h);
                    rect.setAttribute("rx", "4");
                    g.appendChild(rect);
                    g.appendChild(createText(x + colW/2, sideY + 18, p.substring(0,4), 10, "middle", "#d0cfb0"));
                });
                g.appendChild(createText(60 + parts.length * (colW+gap) / 2, sideY + 35, "منظور جانبي", 14, "middle", "#b8a87f"));

                // منظور أمامي (يسار)
                const topY = 550, r = 16, topGap = 25, topStart = 660;
                parts.forEach((p, i) => {
                    const cx = topStart + i * (r*2 + topGap);
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", cx); circle.setAttribute("cy", topY);
                    circle.setAttribute("r", r);
                    g.appendChild(circle);
                    g.appendChild(createText(cx, topY + 5, p.substring(0,3), 9, "middle", "#d0cfb0"));
                });
                g.appendChild(createText(topStart + parts.length * (r*2+topGap)/2, topY + 35, "منظور أمامي (مقطع)", 14, "middle", "#b8a87f"));

                svg.appendChild(g);
            }

            function generate() {
                const title = inventionInput.value.trim() || "مخطط تقني";
                const parts = parseParts(partsInput.value);
                if (parts.length === 0) {
                    alert("الرجاء إدخال قائمة الأجزاء.");
                    return;
                }

                const svg = createBaseSVG();
                svg.appendChild(createText(50, 65, title, 28, "start", "#f0e6c5"));
                drawMain(svg, parts);
                drawAux(svg, parts);

                container.innerHTML = '';
                container.appendChild(svg);
            }

            function downloadSVG() {
                const svgEl = container.querySelector('svg');
                if (!svgEl) return alert('لا يوجد مخطط.');
                const ser = new XMLSerializer();
                const str = '<?xml version="1.0" encoding="UTF-8"?>\n' + ser.serializeToString(svgEl);
                const blob = new Blob([str], {type:'image/svg+xml'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (inventionInput.value.trim()||'مخطط')+'.svg';
                a.click();
            }

            function downloadPNG() {
                const svgEl = container.querySelector('svg');
                if (!svgEl) return alert('لا يوجد مخطط.');
                const ser = new XMLSerializer();
                const str = ser.serializeToString(svgEl);
                const canvas = document.createElement('canvas');
                canvas.width = SVG_W; canvas.height = SVG_H;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                const blob = new Blob([str], {type:'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                img.onload = () => {
                    ctx.drawImage(img,0,0);
                    URL.revokeObjectURL(url);
                    canvas.toBlob(b => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(b);
                        a.download = (inventionInput.value.trim()||'مخطط')+'.png';
                        a.click();
                    },'image/png');
                };
                img.src = url;
            }

            document.getElementById('generateBtn').addEventListener('click', generate);
            document.getElementById('downloadSvgBtn').addEventListener('click', downloadSVG);
            document.getElementById('downloadPngBtn').addEventListener('click', downloadPNG);
            window.addEventListener('DOMContentLoaded', generate);
        })();
    </script>
</body>
</html>
